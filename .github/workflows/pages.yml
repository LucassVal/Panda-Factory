name: GitHub Pages Deploy (PF App React)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 📋 Assemble Deployment Directory
        run: |
          mkdir -p deploy/app
          # Landing page → root
          cp pf/index.html deploy/index.html
          # Assets (logo, images) → /assets/
          if [ -d "pf/assets" ]; then cp -r pf/assets deploy/assets; fi
          # React app build (LOCAL PRE-BUILT) → /app/
          if [ -d "pf/dist" ]; then cp -r pf/dist/* deploy/app/; fi
          # PWA assets
          if [ -f "pf/manifest.json" ]; then cp pf/manifest.json deploy/; fi
          if [ -f "pf/favicon.ico" ]; then cp pf/favicon.ico deploy/; fi
          # Prevent Jekyll
          touch deploy/.nojekyll
          echo "✅ Deployment directory assembled from local artifacts"

      - name: 📋 Verify Artifacts
        run: |
          echo "=== deploy/ root ==="
          ls -la deploy/
          echo "=== deploy/app/ ==="
          ls -la deploy/app/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 Deployment Complete
        run: |
          echo "Panda Factory UI is LIVE (Sync Deploy)"
